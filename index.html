  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    // Fix: hidden sticky topbar was reserving 60px of empty cream space at the
    // top of the cover. Switch to fixed so it overlays without taking layout space.
    const _whmTopbarFix = document.createElement('style');
    _whmTopbarFix.textContent = '.topbar{position:fixed!important;left:0!important;right:0!important;top:0!important;}';
    (document.head || document.documentElement).appendChild(_whmTopbarFix);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

4px,5.5vw,72px);line-height:1.1;\n  letter-spacing:0.04em;color:var(--fg-1);\n}\nh2{\n  font-family:var(--font-display);font-weight:400;\n  font-size:clamp(40px,5vw,64px);line-height:1.08;\n  letter-spacing:0.04em;color:var(--fg-1);\n}\nh3{\n  font-family:var(--font-body);font-weight:600;\n  font-size:clamp(24px,2.8vw,34px);line-height:1.22;\n  letter-spacing:-0.01em;color:var(--fg-1);\n}\nh4{\n  font-family:var(--font-body);font-weight:600;\n  font-size:18px;line-height:1.3;color:var(--fg-1);\n}\np{font-size:16px;line-height:1.7;color:var(--fg-2)}\n.lede{font-size:19px;line-height:1.6;color:var(--fg-3);font-weight:400;max-width:62ch}\n\n.eyebrow{\n  font-family:var(--font-body);\n  font-size:11px;font-weight:500;\n  letter-spacing:0.12em;text-transform:uppercase;\n  color:var(--fg-gold);\n  display:inline-flex;align-items:center;gap:10px;\n}\n.eyebrow::before{\n  content:\"\";display:inline-block;\n  width:24px;height:1px;background:var(--color-gold-accent);\n  opacity:0.7;\n}\n.eyebrow.muted{color:var(--color-muted-slate)}\n.eyebrow.muted::before{background:var(--color-muted-slate);opacity:0.4}\n\n.label{\n  font-family:var(--font-body);font-size:11px;font-weight:600;\n  letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);\n}\n\n/* ============ BUTTONS ============ */\n.btn{\n  display:inline-flex;align-items:center;justify-content:center;gap:8px;\n  font-family:var(--font-body);font-size:14px;font-weight:600;\n  padding:13px 28px;border-radius:6px;border:none;cursor:pointer;\n  transition:background var(--duration-base) var(--ease-out),\n             transform var(--duration-base) var(--ease-out),\n             box-shadow var(--duration-base) var(--ease-out);\n  letter-spacing:0.01em;text-decoration:none;min-height:44px;\n}\n.btn:hover{transform:translateY(-1px);opacity:1}\n.btn:active{transform:translateY(0)}\n.btn-gold{background:var(--color-gold-accent);color:var(--color-deep-charcoal)}\n.btn-gold:hover{background:#d4c79d;box-shadow:var(--shadow-md)}\n.btn-primary{background:var(--color-midnight-blue);color:var(--fg-inverse)}\n.btn-primary:hover{background:var(--color-midnight-blue-90);box-shadow:var(--shadow-md)}\n.btn-outline-light{background:transparent;color:rgba(248,247,243,0.85);border:1px solid rgba(248,247,243,0.25)}\n.btn-outline-light:hover{background:rgba(248,247,243,0.08);border-color:rgba(248,247,243,0.45)}\n.btn-outline-dark{background:transparent;color:var(--color-midnight-blue);border:1px solid var(--color-midnight-blue)}\n.btn-outline-dark:hover{background:rgba(16,42,67,0.05)}\n.btn-arrow{transition:transform var(--duration-base) var(--ease-out)}\n.btn:hover .btn-arrow{transform:translateX(3px)}\n\n/* ============ TOPBAR ============ */\n.topbar{\n  position:sticky;top:0;z-index:50;\n  background:rgba(248,247,243,0.92);\n  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);\n  border-bottom:1px solid var(--border-light);\n  padding:14px 0;\n  transform:translateY(-100%);\n  transition:transform 360ms var(--ease-out),opacity 360ms var(--ease-out);\n  opacity:0;pointer-events:none;\n}\n.topbar.is-visible{\n  transform:translateY(0);opacity:1;pointer-events:auto;\n}\n.topbar-row{\n  display:flex;align-items:center;justify-content:space-between;gap:20px;\n}\n.brand-mark{\n  display:flex;align-items:center;gap:10px;\n  font-family:var(--font-display);font-size:18px;\n  color:var(--color-midnight-blue);letter-spacing:0.04em;\n}\n.brand-mark-square{\n  width:24px;height:24px;background:var(--gradient-soft-premium);\n  border-radius:2px;\n  display:flex;align-items:center;justify-content:center;\n}\n.brand-mark-square span{\n  font-family:var(--font-display);font-size:13px;\n  color:var(--color-midnight-blue);\n}\n.topbar-meta{\n  display:flex;align-items:center;gap:18px;\n}\n.topbar-pill{\n  background:var(--color-midnight-blue);color:var(--color-warm-offwhite);\n  padding:6px 14px;border-radius:9999px;\n  font-family:var(--font-body);font-size:10px;font-weight:600;\n  letter-spacing:0.1 m-status{\n  font-family:var(--font-body);font-size:13px;line-height:1.6;\n  color:rgba(248,247,243,0.72);\n  padding:0 12px;min-height:1.2em;\n  text-wrap:pretty;\n}\n.cinema-form-status.success{color:var(--color-gold-accent)}\n.cinema-manifesto{\n  margin-top:10px;\n  display:inline-flex;align-items:center;gap:10px;\n  font-family:var(--font-body);font-size:12px;font-weight:600;\n  letter-spacing:0.16em;text-transform:uppercase;\n  color:var(--fg-inverse);\n  border-radius:9999px;padding:13px 28px;\n  background:rgba(248,247,243,0.04);\n  cursor:pointer;\n  align-self:center;\n}\n.cinema-manifesto:hover{background:rgba(206,193,149,0.10)}\n.cinema-manifesto-dot{\n  width:6px;height:6px;background:var(--color-gold-accent);\n  transform:rotate(45deg);\n}\n\n.cinema-foot{\n  position:relative;z-index:10;\n  display:flex;justify-content:space-between;align-items:flex-end;\n  padding:0 32px 36px;\n  gap:20px;flex-wrap:wrap;\n}\n@media(max-width:639px){\n  .cinema-foot{justify-content:center;text-align:center;padding:0 20px 28px}\n}\n.cinema-foot-meta{\n  display:flex;flex-direction:column;gap:4px;\n  font-family:var(--font-body);\n  color:rgba(248,247,243,0.55);\n}\n.cinema-foot-meta .top{\n  font-size:10px;font-weight:600;letter-spacing:0.20em;text-transform:uppercase;\n  color:var(--color-gold-accent);\n}\n.cinema-foot-meta .bot{\n  font-size:12px;font-weight:400;letter-spacing:0.04em;\n  color:rgba(248,247,243,0.72);\n}\n.cinema-socials{\n  display:flex;align-items:center;gap:12px;\n}\n.cinema-social-btn{\n  width:44px;height:44px;border-radius:9999px;\n  display:flex;align-items:center;justify-content:center;\n  color:rgba(248,247,243,0.78);\n  cursor:pointer;\n  background:rgba(248,247,243,0.04);\n  transition:color 200ms var(--ease-out);\n}\n.cinema-social-btn:hover{color:var(--color-gold-accent)}\n.cinema-social-btn svg{width:18px;height:18px;stroke-width:1.6px}\n\n/* Cover (formerly hero) — small adjustments so the eyebrow + numbering\n   reads as the document's section 01 now that the cinema hero precedes it */\n.hero{padding-top:80px}\n.hero-section-marker{\n  font-family:var(--font-display);font-weight:400;\n  font-size:11px;letter-spacing:0.20em;text-transform:uppercase;\n  color:var(--color-gold-accent);\n  display:inline-flex;align-items:center;gap:12px;\n  margin-bottom:20px;\n}\n.hero-section-marker::before{\n  content:\"\";width:28px;height:1px;background:var(--color-gold-accent);opacity:0.7;\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ============ TOPBAR ============ -->\n<div class=\"topbar\">\n  <div class=\"container\">\n    <div class=\"topbar-row\">\n      <div class=\"brand-mark\">\n        White Haus Media\n      <\u002Fdiv>\n      <div class=\"topbar-meta\">\n        <span class=\"topbar-prepared\">Prepared for <strong>Briana Houston, M.Ed.<\u002Fstrong><\u002Fspan>\n        <span class=\"topbar-pill\">Private Proposal<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Cinema-hero removed; the document opens directly on its own cover section. -->\n\n<!-- ============ COVER (formerly hero — the document's first content section) ============ -->\n<section class=\"hero\" id=\"cover\">\n  <div class=\"hero-glow-1\"><\u002Fdiv>\n  <div class=\"hero-glow-2\"><\u002Fdiv>\n  <div class=\"hero-rail\" aria-hidden=\"true\"><\u002Fdiv>\n  <div class=\"container hero-inner\">\n    <div class=\"hero-meta\">\n      <div class=\"hero-meta-item\">\n        <span class=\"label\">Document<\u002Fspan>\n        <span class=\"value\">Strategic Concept<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero-meta-divider\"><\u002Fdiv>\n      <div class=\"hero-meta-item\">\n        <span class=\"label\">Prepared For<\u002Fspan>\n        <span class=\"value\">Learning with Ms. Houston<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero-meta-divider\"><\u002Fdiv>\n      <div class=\"hero-meta-item\">\n        <span class=\"label\">Date<\u002Fspan>\n        <span class=\"value\">April 2026<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero-meta-divider\"><\u002Fdiv>\n      <div class=\"hero-meta-item\">\n        <span class=\"label\">Section<\u002Fspan>\n        <span class=\"value\" style=\"font-family:var(--font-display);font-weight:400;letter-spacing:0.04em\">01 · Cover<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1>A Working Concept for <span class=\"accent\">Learning with Ms. Houston.<\u002Fspan><\u002Fh1>\n\n    <p class=\"hero-sub\">An unsolicited strategic concept built by White Haus Media for Briana Ambr'e Houston, M.Ed., and the team at IPY Agency. No pitch attached. Just an honest look at what is possible.<\u002Fp>\n\n    <div class=\"hero-trust\">\n      <div class=\"trust-item\">\n        <span class=\"trust-val\">621K<\u002Fspan>\n        <span class=\"trust-label\">YouTube Subscribers<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"trust-item\">\n        <span class=\"trust-val\">147M<\u002Fspan>\n        <span class=\"trust-label\">Lifetime Video Views<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"trust-item\">\n        <span class=\"trust-val\">9.85M<\u002Fspan>\n        <span class=\"trust-label\">Monthly Views<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"trust-item\">\n        <span class=\"trust-val\">50<\u002Fspan>\n        <span class=\"trust-label\">States Reached<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"trust-source\">Public channel data, vidIQ, April 2026.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ LETTER ============ -->\n<section class=\"section letter-section\" id=\"letter\">\n  <div class=\"container\">\n    <div class=\"letter-grid\">\n      <div class=\"letter-side\">\n\n        <span class=\"eyebrow\">A Note<\u002Fspan>\n        <h3>From the team at White Haus Media.<\u002Fh3>\n        <p class=\"from\">To <strong>Adrienne Alexander<\u002Fstrong>, IPY Agency<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"letter-body\">\n        <p>Briana has built what most creators never reach. A 621,000-subscriber audience that listens, a micro-school that delivers on the curriculum, and a body of original songs and printables that thousands of families now treat as part of their child's morning routine. That is not a content channel. That is an institution in early formation.<\u002Fp>\n        <p>But the institution is now ahead of the website. Printables sit behind a third-party iframe. Video requests run through a Google Form. Party supplies live on a different domain. Small things on their own. Together, a quiet tax on every visitor and every dollar that should be hers.<\u002Fp>\n        <p>So we spent the last week building a concept, on our own time, with no obligation attached. We wanted to show what the next version of Learning with Ms. Houston could look like when the website carries the same weight as the channel.<\u002Fp>\n        <p>The next pages walk through what we noticed, what is inside the concept, and how we would think about working together if there is interest. If there is not, the concept stays yours, and we wish her well. Either way, the work was a privilege.<\u002Fp>\n        <p class=\"signature\">Rico &amp; Colton<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PULL QUOTE ============ -->\n<section class=\"quote-section\">\n  <div class=\"container\">\n    <div class=\"quote-inner\">\n      <span class=\"quote-mark\">“<\u002Fspan>\n      <p class=\"quote-body\">My mission is to inspire a love for learning by using rhythm, movement, and culturally relevant content to reach children in a fun, accessible, and meaningful way. We are redefining what education looks like for kids who do not always see themselves in traditional classrooms.<\u002Fp>\n      <span class=\"quote-attribution\">Briana Ambr'e Houston, M.Ed.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WHITE HAUS MEDIA ============ -->\n<section class=\"whm-section\">\n  <div class=\"container\">\n    <div class=\"whm-inner\">\n\n      <span class=\"eyebrow\">White Haus Media<\u002Fspan>\n      <h2 class=\"whm-headline\">A boutique studio for the build, the growth, and the systems behind both.<\u002Fh2>\n      <p class=\"whm-description\">White Haus Media is a small studio working with businesses, brands, and entrepreneurs who want their digital presence to operate as carefully as the rest of the work. Three services, one studio, deliberate by default.<\u002Fp>\n\n      <div class=\"whm-services\">\n        <div class=\"whm-service\">\n          <div class=\"whm-service-icon\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M9 21V9\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h4>Web Design<\u002Fh4>\n          <p>Custom builds on owned infrastructure, built to scale and to last.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"whm-service\">\n          <div class=\"whm-service-icon\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4.35-4.35\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h4>Search Engine Optimization<\u002Fh4>\n          <p>Search and content strategy that turns audiences into customers over time.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"whm-service\">\n          <div class=\"whm-service-icon\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h4>Custom AI Workflows<\u002Fh4>\n          <p>Automation and tooling that takes friction out of how a business runs.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"whm-clients\">\n        <span class=\"whm-clients-label\">For<\u002Fspan>\n        <span class=\"whm-clients-list\">businesses, brands, and entrepreneurs<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ OBSERVATIONS ============ -->\n<section class=\"section observations-section\" id=\"observations\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n\n      <span class=\"eyebrow\">Observations<\u002Fspan>\n      <h2>Where the business meets the web.<\u002Fh2>\n      <p class=\"lede\">Two observations from time spent inside Briana's brand. Each one shaped something in the pages that follow.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"obs-grid\">\n      <article class=\"obs-card\">\n        <div class=\"obs-card-num\">01<\u002Fdiv>\n        <h4>A rich product ecosystem, ready for a branded home.<\u002Fh4>\n        <p>Books on Amazon, printables on TPT, music on Spotify, party supplies through a trusted partner. Each of those distribution choices puts Briana where her audience already is, which is the right call. What is missing is a single branded surface that ties them together, so a parent finds the whole world of Ms. Houston in one place before they head to the platform that ships it.<\u002Fp>\n      <\u002Farticle>\n\n      <article class=\"obs-card\">\n        <div class=\"obs-card-num\">02<\u002Fdiv>\n        <h4>DELA Academy is the most defensible asset, and it is invisible online.<\u002Fh4>\n        <p>Differentiated learning for K-5 students with autism, ADHD, and learning disabilities is a category with almost no quality digital product and parents who pay seriously for what works. The school exists. The web presence does not yet reflect it.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ THE CONCEPT (cards) ============ -->\n<section class=\"section inside-section\" id=\"concept\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n\n      <span class=\"eyebrow\">The Concept<\u002Fspan>\n      <h2>Five additions to the foundation Briana already built.<\u002Fh2>\n      <p class=\"lede\">Rather than describe the concept in slides, we built a working version on a live domain. The cards below outline what is inside it. The link to view it is at the end of this proposal, designed to be the last thing you see and the next step you take.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"inside-grid\">\n      <article class=\"inside-card featured\">\n        <div class=\"card-eyebrow\">Recurring Revenue<\u002Fdiv>\n        <h4>The Scholars Club<\u002Fh4>\n        <p>A three-tier membership built so every family who wants Ms. Houston in their home can have her. Free starter pack, Scholar at nine dollars, Master Scholar at nineteen. Mission first. Recurring revenue as the byproduct.<\u002Fp>\n        <div class=\"impact\">Converts existing audience into ad-free, ongoing relationship.<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"inside-card\">\n        <div class=\"card-eyebrow\">B2B &amp; Special Needs<\u002Fdiv>\n        <h4>The DELA Hub<\u002Fh4>\n        <p>A dedicated section for differentiated learning resources, organized by audience. Families of neurodivergent learners, special-needs co-ops and micro-schools, classroom teachers, and parents new to differentiation each find their own path.<\u002Fp>\n        <div class=\"impact\">Opens school district licensing and co-op revenue.<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"inside-card\">\n        <div class=\"card-eyebrow\">Productized Service<\u002Fdiv>\n        <h4>Branded Video Request Flow<\u002Fh4>\n        <p>A six-step modal replaces the Google Form. Pricing is transparent at $350, the rush fee is explained up front, and the experience matches the rest of the brand. Every field from the original form is captured, reformatted, and emailed to the team.<\u002Fp>\n        <div class=\"impact\">Removes friction from the highest-margin offer.<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"inside-card\">\n        <div class=\"card-eyebrow\">Unified Catalog<\u002Fdiv>\n        <h4>One Branded Storefront<\u002Fh4>\n        <p>Books, printables, party supplies, and music presented together in one place that feels unmistakably like Ms. Houston. Customers explore the full catalog inside the brand, then purchase wherever the product is sold, on Amazon, TPT, Spotify, or her trusted partner stores.<\u002Fp>\n        <div class=\"impact\">Distribution stays where it works. The discovery now happens at home.<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"inside-card\">\n        <div class=\"card-eyebrow\">Owned Infrastructure<\u002Fdiv>\n        <h4>Audience &amp; IP Protection<\u002Fh4>\n        <p>Email capture replaces dependence on the YouTube algorithm. A footer signature establishes ownership of every asset on the site. The video request flow no longer routes through Google. The infrastructure now serves the mission rather than the other way around.<\u002Fp>\n        <div class=\"impact\">Reduces platform risk, builds audience Briana owns.<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"inside-card\">\n        <div class=\"card-eyebrow\">SEO Foundation<\u002Fdiv>\n        <h4>Search-Ready Architecture<\u002Fh4>\n        <p>Schema markup, semantic structure, and intent-mapped landing pages built in from day one. Three SEO plays prioritized: spillover search from YouTube viewers, free printables that compete with TPT and Pinterest, and educator-intent keywords that feed the DELA hub.<\u002Fp>\n        <div class=\"impact\">Compounding traffic that does not depend on the channel.<\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ THE MATH ============ -->\n<section class=\"math-section\">\n  <div class=\"container\">\n    <div class=\"math-inner\">\n      <div class=\"math-label\">\n        <span class=\"eyebrow\">The Math<\u002Fspan>\n        <h3>For illustration, not commitment.<\u002Fh3>\n        <p>One way to think about the Scholar tier opportunity. The same model holds at lower or higher conversion rates, and the Master Scholar tier, video request bookings, and educator licensing layer on top.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"math-display\">\n        <div class=\"math-equation\">\n          <div class=\"math-row\">\n            <span class=\"term\">Subscribers<\u002Fspan>\n            <span class=\"val\">621,000<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"math-row\">\n            <span class=\"term\">Conversion to Scholar tier<\u002Fspan>\n            <span class=\"val\">0.5%<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"math-row\">\n            <span class=\"term\">Members × $9/month<\u002Fspan>\n            <span class=\"val\">3,105 members<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"math-result\">\n            <span class=\"term\">Monthly Recurring<\u002Fspan>\n            <span class=\"val\">$27,945<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"math-foot\">Conservative model. Real-world conversion at this scale typically lands between 0.3 and 1.2 percent for premium creator memberships.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ HOW WE WORK ============ -->\n<section class=\"section how-section\">\n  <div class=\"container\">\n    <div class=\"how-grid\">\n      <div>\n\n        <span class=\"eyebrow\">How We Work<\u002Fspan>\n        <h2 style=\"margin-top:14px\">Four principles that shape every project.<\u002Fh2>\n        <p class=\"lede\" style=\"margin-top:18px\">These show up in the contract, in the daily work, and in how we leave a project when it ends. They are the parts of the engagement Briana is most likely to feel.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"how-values\">\n        <div class=\"how-value\">\n          <div class=\"how-value-num\">1<\u002Fdiv>\n          <div>\n            <h4>Mission before metrics.<\u002Fh4>\n            <p>Every recommendation has to serve the audience first. Revenue follows trust, not the other way around.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"how-value\">\n          <div class=\"how-value-num\">2<\u002Fdiv>\n          <div>\n            <h4>You own everything.<\u002Fh4>\n            <p>Code, copy, design files, customer data, domains. We build it for you to keep, with no agency lock-in. If we ever part ways, nothing about your business changes.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"how-value\">\n          <div class=\"how-value-num\">3<\u002Fdiv>\n          <div>\n            <h4>Contracts that protect you.<\u002Fh4>\n            <p>IP assignment, original work warranties, and clear scope language are written into every engagement, because they matter and because we have seen what happens when they do not.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"how-value\">\n          <div class=\"how-value-num\">4<\u002Fdiv>\n          <div>\n            <h4>Transparent process.<\u002Fh4>\n            <p>Weekly written updates, a shared project tracker, and direct access to the people doing the work. No middlemen, no account managers, no surprises.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ENGAGEMENT ============ -->\n<section class=\"section invest-section\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n\n      <span class=\"eyebrow\">The Engagement<\u002Fspan>\n      <h2>How we shape the work.<\u002Fh2>\n      <p class=\"lede\">There is no template engagement at White Haus Media. Briana's goals, runway, and where she wants the studio's involvement to begin and end are what shape the structure. What does not change are the principles inside every contract.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"invest-grid\">\n      <article class=\"invest-card\">\n        <div class=\"tier-eyebrow\">Project<\u002Fdiv>\n        <h4>The Build<\u002Fh4>\n        <p class=\"invest-body\">A defined scope, three milestones, and a clean handoff at launch. The right shape when Briana wants the new infrastructure in place and prefers to take it from there.<\u002Fp>\n        <div class=\"invest-best\">Best for: clear deliverables, fixed timeline.<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"invest-card featured\">\n        <div class=\"tier-eyebrow\">Most Common<\u002Fdiv>\n        <h4>Build &amp; Partnership<\u002Fh4>\n        <p class=\"invest-body\">The build paired with an ongoing monthly engagement covering content additions, search engine optimization, performance reviews, and infrastructure improvements. Sized to fit the goal.<\u002Fp>\n        <div class=\"invest-best\">Best for: ongoing momentum without rebuilding the relationship every few months.<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"invest-card\">\n        <div class=\"tier-eyebrow\">Strategic<\u002Fdiv>\n        <h4>Performance Partnership<\u002Fh4>\n        <p class=\"invest-body\">A reduced upfront investment paired with a performance share on net new recurring revenue. Designed for longer engagements where both sides want a deeper alignment of incentives.<\u002Fp>\n        <div class=\"invest-best\">Best for: shared upside, multi-year horizon.<\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <div class=\"invest-note\">\n      <strong>How we contract.<\u002Fstrong> Every engagement is documented in plain language with intellectual property assigned to Briana, source code transferred at launch, an original work warranty, and a clear off-ramp at any point. Investment is shaped to scope and discussed in conversation, not assumed in a document.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ NEXT STEPS / THE REVEAL ============ -->\n<section class=\"section next-section\" id=\"next\">\n  <div class=\"container next-inner\">\n\n    <span class=\"eyebrow\">The Reveal<\u002Fspan>\n    <h2 style=\"margin-top:14px\">Open the concept.<\u002Fh2>\n    <p class=\"lede\">A working version of everything described above, on a real domain you can click through on any device. The concept is yours to keep, share with the team, or set aside, regardless of what happens next.<\u002Fp>\n\n    <div class=\"concept-frame\" style=\"margin-top:48px\">\n      <div class=\"concept-frame-bar\">\n        <div class=\"concept-frame-dots\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n        <div class=\"concept-frame-url\">mshouston.com<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"concept-frame-iframe-wrap\">\n        <iframe src=\"concept-preview.html\" title=\"Live concept preview for Learning with Ms. Houston\" loading=\"lazy\"><\u002Fiframe>\n      <\u002Fdiv>\n      <div class=\"concept-frame-footer\">\n        <a href=\"concept-preview.html\" target=\"_blank\" rel=\"noopener\" class=\"btn btn-gold\">Open the Concept in a New Tab <span class=\"btn-arrow\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"next-actions\" style=\"margin-top:48px\">\n      <a href=\"mailto:hello@whitehausmedia.com?subject=Re%3A%20Strategic%20Concept%20for%20Learning%20with%20Ms.%20Houston\" class=\"btn btn-outline-dark\">Schedule a 30-Minute Call<\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"next-contact\" style=\"margin-top:32px\">\n      Or reply directly to <a href=\"mailto:hello@whitehausmedia.com\">hello@whitehausmedia.com<\u002Fa>, or forward this proposal to anyone on the Ms. Houston or IPY team.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer>\n  <div class=\"container\">\n    <div class=\"footer-row\">\n      <div class=\"footer-mark\">\n        White Haus Media\n      <\u002Fdiv>\n      <span class=\"footer-doc\">Private Proposal · April 2026<\u002Fspan>\n      <span class=\"footer-legal\">© 2026 White Haus Media. All rights reserved.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n(function(){\n  // ============ Video fade-loop system (rAF-based, no CSS transitions) ============\n  var video = document.getElementById('cinemaVideo');\n  if(!video) return;\n  var FADE_MS = 500;\n  var TAIL_S = 0.55;   // when N seconds remain, start fade-out\n  var rafId = null;\n  var fadingOut = false;\n\n  function cancelAnim(){ if(rafId){ cancelAnimationFrame(rafId); rafId = null; } }\n\n  function fadeTo(target){\n    cancelAnim();\n    var start = parseFloat(video.style.opacity || '0');\n    var t0 = performance.now();\n    function step(now){\n      var p = Math.min(1,(now - t0)/FADE_MS);\n      var v = start + (target - start)*p;\n      video.style.opacity = v.toFixed(3);\n      if(p < 1){ rafId = requestAnimationFrame(step); }\n      else{ rafId = null; }\n    }\n    rafId = requestAnimationFrame(step);\n  }\n\n  function fadeIn(){ fadingOut = false; fadeTo(1); }\n\n  var hero = document.querySelector('.cinema-hero');\n  hero && hero.classList.add('is-ready');\n\n  // ============ Topbar reveal-on-scroll-past-cinema-hero ============\n  var topbar = document.querySelector('.topbar');\n  if(topbar && hero && 'IntersectionObserver' in window){\n    var io = new IntersectionObserver(function(entries){\n      entries.forEach(function(en){\n        if(en.intersectionRatio < 0.15){\n          topbar.classList.add('is-visible');\n        }else{\n          topbar.classList.remove('is-visible');\n        }\n      });\n    },{ threshold:[0, 0.15, 0.5, 1] });\n    io.observe(hero);\n  }else if(topbar){\n    topbar.classList.add('is-visible');\n  }\n\n  video.addEventListener('loadeddata', function(){\n    video.style.opacity = '0';\n    var p = video.play();\n    if(p && p.catch) p.catch(function(){});\n    fadeIn();\n  });\n\n  video.addEventListener('timeupdate', function(){\n    if(fadingOut) return;\n    if(!isFinite(video.duration)) return;\n    var remaining = video.duration - video.currentTime;\n    if(remaining <= TAIL_S){\n      fadingOut = true;\n      fadeTo(0);\n    }\n  });\n\n  video.addEventListener('ended', function(){\n    cancelAnim();\n    video.style.opacity = '0';\n    setTimeout(function(){\n      try{\n        video.currentTime = 0;\n        var p = video.play();\n        if(p && p.catch) p.catch(function(){});\n      }catch(e){}\n      fadeIn();\n    },100);\n  });\n\n  // Some browsers fire 'loadeddata' before script attaches if the resource is cached\n  if(video.readyState >= 2){\n    video.style.opacity = '0';\n    var p = video.play();\n    if(p && p.catch) p.catch(function(){});\n    fadeIn();\n  }\n\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
